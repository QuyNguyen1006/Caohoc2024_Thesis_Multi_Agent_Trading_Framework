# Example configuration file
# Copy to config.yaml and customize for your environment

# Application settings
app:
  name: Multi-Agent Trading Framework
  version: 0.1.0
  debug: false
  log_level: INFO

# LLM Configuration
llm:
  provider: openai  # openai, anthropic, etc.
  model: gpt-4
  temperature: 0.7
  max_tokens: 2000

# Knowledge Graph Configuration
knowledge_graph:
  type: neo4j  # neo4j, networkx, etc.
  host: localhost
  port: 7687
  database: neo4j

# Trading Configuration
trading:
  mode: backtest  # backtest, paper, live
  initial_capital: 100000
  max_position_size: 0.1
  stop_loss_pct: 0.05
  take_profit_pct: 0.15

# Data Configuration
data:
  source: csv  # csv, api, database
  raw_path: ./data/raw/
  processed_path: ./data/processed/
  update_frequency: daily

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: ./logs/app.log
